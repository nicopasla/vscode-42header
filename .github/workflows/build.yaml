name: Build
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25.x'
    - name: Install dependencies
      run: npm install
    - name: Compile
      run: npm run compile
    - name: Run unit tests
      run: npm run test:unit
    - name: Package extension
      run: npm run package
    - name: Upload vsix
      uses: actions/upload-artifact@v4
      with:
        name: 42belgiumheader
        path: '*.vsix'